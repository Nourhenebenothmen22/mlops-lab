stages:
  - setup
  - test
  - train
  - deploy

variables:
  MLFLOW_TRACKING_URI: "http://mlflow-web:5000"  # Adaptez si GitLab Runner est externe
  AWS_ACCESS_KEY_ID: "mlflow"
  AWS_SECRET_ACCESS_KEY: "password"

before_script:
  - pip install -r requirements.txt

test:
  stage: test
  script:
    - pytest tests/ -v
  only:
    - merge_requests
    - main

train:
  stage: train
  script:
    - dvc pull  # Récupère les données versionnées
    - python src/train.py  # Script production-ready
  artifacts:
    reports:
      metrics: metrics.txt  # Si vous exportez des métriques pour GitLab
  only:
    - main

deploy:
  stage: deploy
  script:
    - echo "Déploiement du modèle via MLflow"
    - python src/deploy.py  # Script qui pull le modèle @production et build l'API
  only:
    - main
  when: manual  # Déclenchement manuel pour la prod