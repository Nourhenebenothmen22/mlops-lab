name: 🚀 MLOps Pipeline - Nourhene Ben othmen 2ING DS-AI 2.2

run-name: CI/CD Run by Nourhene Ben othmen 2ING DS-AI 2.2

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AUTHOR: "Nourhene Ben othmen 2ING DS-AI 2.2"

jobs:
  test:
    name: 1️⃣ Tests Unités - Nourhene Ben othmen 2ING DS-AI 2.2
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 📦 Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-v16-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-v16-

      - name: ⬇️ Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🧪 Run Pytest
        id: pytest
        run: pytest tests/ -v

      - name: 📢 Notify Discord - Tests Success
        if: always() && github.event_name == 'push' && success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -X POST -H "Content-Type: application/json" \
              -d "{\"username\":\"${{ env.AUTHOR }}\",\"content\":\"✅ **${{ env.AUTHOR }}** | Stage 1/3: Tests Unités Réussis\",\"embeds\":[{\"color\":3066993,\"fields\":[{\"name\":\"🌿 Branch\",\"value\":\"${{ github.ref_name }}\",\"inline\":true},{\"name\":\"📌 Commit\",\"value\":\"${{ github.sha }}\",\"inline\":false}]}]}" \
              "$DISCORD_WEBHOOK"
          fi

      - name: 📢 Notify Discord - Tests Failed
        if: always() && github.event_name == 'push' && failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -X POST -H "Content-Type: application/json" \
              -d "{\"username\":\"${{ env.AUTHOR }}\",\"content\":\"❌ **${{ env.AUTHOR }}** | Stage 1/3: Tests Unités Échoués\",\"embeds\":[{\"color\":15158332,\"fields\":[{\"name\":\"🔍 Action\",\"value\":\"Vérifier les logs pytest\",\"inline\":false}]}]}" \
              "$DISCORD_WEBHOOK"
          fi

  train:
    name: 2️⃣ Entraînement & Registry - Nourhene Ben othmen 2ING DS-AI 2.2
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 📦 Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-v16-${{ hashFiles('**/requirements.txt') }}

      - name: ⬇️ Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install transformers>=4.30.0

      - name: 🔧 Setup Git
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"

      - name: 💾 Try DVC Pull
        id: dvc_pull
        continue-on-error: true
        run: timeout 60 dvc pull -r myremote || echo "⚠️ DVC pull failed"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID || 'fake-key' }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY || 'fake-secret' }}

      - name: 🎯 Run Full Multi-Model Script
        id: training
        run: python src/train.py
        env:
          CI: "true"
          MLFLOW_TRACKING_URI: "file:///tmp/mlruns"

      - name: 📊 Extract Multi-Model Metrics
        id: metrics
        if: success()
        run: |
          if [ -f metrics.json ]; then
            TAB_MOD=$(jq -r '.tabular_model' metrics.json)
            TAB_RUN=$(jq -r '.tabular_run_name' metrics.json)
            R2=$(jq -r '.r2_score' metrics.json)
            PREDS=$(jq -c '.tabular_preds' metrics.json)
            LINK=$(jq -r '.tabular_link' metrics.json)
            
            NLP_MOD=$(jq -r '.nlp_model' metrics.json)
            NLP_RUN=$(jq -r '.nlp_run_name' metrics.json)
            NLP_STAT=$(jq -r '.nlp_status' metrics.json)
            
            echo "tab_mod=$TAB_MOD" >> $GITHUB_OUTPUT
            echo "tab_run=$TAB_RUN" >> $GITHUB_OUTPUT
            echo "r2=$R2" >> $GITHUB_OUTPUT
            echo "preds=$PREDS" >> $GITHUB_OUTPUT
            echo "link=$LINK" >> $GITHUB_OUTPUT
            echo "nlp_mod=$NLP_MOD" >> $GITHUB_OUTPUT
            echo "nlp_run=$NLP_RUN" >> $GITHUB_OUTPUT
            echo "nlp_stat=$NLP_STAT" >> $GITHUB_OUTPUT
          fi

      - name: 📤 Upload MLflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-dual-registry-Nourhene-Ben-othmen
          path: |
            /tmp/mlruns
            metrics.json
          retention-days: 7

      - name: 📢 Notify Discord - Dual Training Success
        if: always() && github.event_name == 'push' && success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TAB_MOD: ${{ steps.metrics.outputs.tab_mod }}
          TAB_RUN: ${{ steps.metrics.outputs.tab_run }}
          R2: ${{ steps.metrics.outputs.r2 }}
          PREDS: ${{ steps.metrics.outputs.preds }}
          LINK: ${{ steps.metrics.outputs.link }}
          NLP_MOD: ${{ steps.metrics.outputs.nlp_mod }}
          NLP_RUN: ${{ steps.metrics.outputs.nlp_run }}
          NLP_STAT: ${{ steps.metrics.outputs.nlp_stat }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            DVC_STATUS="${{ steps.dvc_pull.outcome == 'success' && 'DVC S3' || 'Sklearn Fallback' }}"
            curl -X POST -H "Content-Type: application/json" \
              -d "{\"username\":\"${{ env.AUTHOR }}\",\"content\":\"🚀 **${{ env.AUTHOR }}** | Stage 2/3: Double Entraînement MLflow Réussi\",\"embeds\":[{\"color\":3066993,\"fields\":[{\"name\":\"📊 Modèle Tabulaire\",\"value\":\"**$TAB_MOD** (\`$TAB_RUN\`)\\n🎯 R² Score : \`$R2\`\\n🔮 Prédictions : \`$PREDS\`\",\"inline\":true},{\"name\":\"🧠 Modèle NLP (HuggingFace)\",\"value\":\"**$NLP_MOD** (\`$NLP_RUN\`)\\n✅ Statut : \`$NLP_STAT\`\",\"inline\":true},{\"name\":\"💾 Source Données\",\"value\":\"$DVC_STATUS\",\"inline\":false},{\"name\":\"🔗 MLflow Tracking\",\"value\":\"[Inspecter le Run Tabulaire sur MLflow]($LINK)\",\"inline\":false}]}]}" \
              "$DISCORD_WEBHOOK"
          fi

      - name: 📢 Notify Discord - Training Failed
        if: always() && github.event_name == 'push' && failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -X POST -H "Content-Type: application/json" \
              -d "{\"username\":\"${{ env.AUTHOR }}\",\"content\":\"💥 **${{ env.AUTHOR }}** | Stage 2/3: Échec Entraînement\",\"embeds\":[{\"color\":15158332,\"fields\":[{\"name\":\"❌ Erreur\",\"value\":\"Vérifier les logs de l'étape 'Run Full Multi-Model Script'\",\"inline\":false}]}]}" \
              "$DISCORD_WEBHOOK"
          fi

  deploy:
    name: 3️⃣ Déploiement Production - Nourhene Ben othmen 2ING DS-AI 2.2
    needs: train
    environment: production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: 📥 Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: mlflow-dual-registry-Nourhene-Ben-othmen
          path: ./artifacts

      - name: 🚀 Simulate Deployment
        run: echo "✅ Modèles DiabetesModel (@production) et DistilBERT_Sentiment déployés avec succès"

      - name: 📢 Notify Discord - Deployment Success
        if: always() && success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -X POST -H "Content-Type: application/json" \
              -d "{\"username\":\"${{ env.AUTHOR }}\",\"content\":\"🎉 **${{ env.AUTHOR }}** | Stage 3/3: Déploiement Production Réussi\",\"embeds\":[{\"color\":3066993,\"fields\":[{\"name\":\"🚀 Modèles Déployés\",\"value\":\"\`DiabetesModel\` (@production)\\n\`DistilBERT_Sentiment\` (NLP)\",\"inline\":false},{\"name\":\"🌐 Env\",\"value\":\"Production\",\"inline\":true},{\"name\":\"✅ Status\",\"value\":\"Actif\",\"inline\":true}]}]}" \
              "$DISCORD_WEBHOOK"
          fi