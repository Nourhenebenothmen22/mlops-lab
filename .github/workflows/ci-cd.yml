name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: 1 - Run Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15  # ⚠️ Empêche le blocage 6h comme précédemment

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          # 🔑 "v2" pour invalider l'ancien cache corrompu (boto3 1.2.0)
          key: ${{ runner.os }}-pip-v2-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-v2-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 🧹 Nettoie les métadonnées corrompues éventuelles
          pip cache purge || true
          pip install -r requirements.txt
      
      - name: Run Pytest
        run: pytest tests/

  train:
    name: 2 - Train Model
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-v2-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-v2-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip cache purge || true
          pip install -r requirements.txt

      - name: DVC - Pull data
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"
          # Timeout pour éviter l'attente infinie si le remote ne répond pas
          timeout 60 dvc pull -r myremote || echo "⚠️ DVC pull failed, using local data if available"
        env:
          AWS_ACCESS_KEY_ID: "fake-key"
          AWS_SECRET_ACCESS_KEY: "fake-secret"

      - name: Run training script
        run: python src/train.py
        env:
          # 🔧 Correction : localhost n'existe pas dans CI
          # Option A: Mode fichier local (recommandé pour CI)
          MLFLOW_TRACKING_URI: "file:///tmp/mlruns"
          # Option B: Désactiver MLflow si non nécessaire en CI
          # MLFLOW_DISABLE_AUTO_LOGGING: "true"

  deploy:
    name: 3 - Deploy Model
    needs: train
    environment: production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 'Simulate Deployment'
        run: |
          echo "🚀 Simulating deployment to production..."
          echo "✅ Model would be deployed here."