name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: 1 - Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # --- DÉBUT DE LA CORRECTION ---
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          # Le dossier où pip stocke les téléchargements
          path: ~/.cache/pip
          # Une clé unique pour ce cache. Si requirements.txt change, la clé change.
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      # --- FIN DE LA CORRECTION ---

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Pytest
        run: pytest tests/

  train:
    name: 2 - Train Model
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # --- ON AJOUTE LE CACHE ICI AUSSI ---
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      # --- FIN DE LA CORRECTION ---

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: DVC - Pull data
        run: dvc pull -r myremote || echo "DVC pull failed as expected (no access to local remote), continuing..."
        env:
          AWS_ACCESS_KEY_ID: "fake-key"
          AWS_SECRET_ACCESS_KEY: "fake-secret"

      - name: Run training script
        run: python src/train.py
        env:
          MLFLOW_TRACKING_URI: "http://localhost:5000"

  # Le job de déploiement n'a pas besoin d'installer de dépendances, donc pas de cache nécessaire ici
  deploy:
    name: 3 - Deploy Model
    needs: train
    environment: production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: 'Simulate Deployment'
        run: |
          echo "🚀 Simulating deployment to production..."
          echo "✅ Model would be deployed here."